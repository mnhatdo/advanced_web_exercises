<div class="container">
  <h2>Product List</h2>
  <table>
    <thead>
      <tr>
        <th>Image</th>
        <th>Product ID</th>
        <th>Product Name</th>
        <th>Price</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td><img [src]="product.Image" [alt]="product.ProductName" class="product-image"></td>
        <td>{{ product.ProductId }}</td>
        <td>{{ product.ProductName }}</td>
        <td>{{ product.Price }}</td>
        <td><button (click)="viewDetail(product.ProductId)">Details</button></td>
      </tr>
    </tbody>
  </table>
</div>
