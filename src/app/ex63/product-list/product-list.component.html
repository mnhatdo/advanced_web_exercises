<div class="shop-wrapper">

  <!-- Header bar -->
  <div class="shop-header">
    <h2 class="shop-title">Diamond Jewelry Shop</h2>
    <a routerLink="/ex63/cart" class="cart-btn">
      🛒 Cart
      @if (cartCount > 0) {
        <span class="cart-badge">{{ cartCount }}</span>
      }
    </a>
  </div>

  @if (loading) {
    <div class="loading">Loading products…</div>
  } @else {
    <div class="product-grid">
      @for (product of products; track product._id) {
        <div class="product-card">

          <div class="product-img-wrap">
            <img [src]="product.image" [alt]="product.name" class="product-img"
                 onerror="this.src='https://via.placeholder.com/220x180?text=No+Image'" />
          </div>

          <div class="product-info">
            <p class="product-name">{{ product.name }}</p>

            <!-- Star rating -->
            <div class="stars">
              @for (i of stars(5); track i) {
                <span [class]="i < product.rating ? 'star filled' : 'star'">★</span>
              }
              <span class="rating-count">({{ product.ratingCount }})</span>
            </div>

            <p class="product-price">{{ formatPrice(product.price) }}</p>
          </div>

          <div class="product-actions">
            <button class="btn-add" (click)="addToCart(product)">
              {{ feedback[product._id] ?? 'ADD TO CART' }}
            </button>
            <button class="btn-icon" title="Compare">⊞</button>
            <button class="btn-icon" title="Wishlist">♡</button>
          </div>

        </div>
      }
    </div>
  }

</div>
