<div class="container">
  <h1>{{ isEditMode ? 'Chỉnh sửa sách' : 'Thêm sách mới' }}</h1>

  @if (loading) {
    <div class="loading">Đang tải dữ liệu...</div>
  } @else {
    <form (ngSubmit)="onSubmit()" #bookForm="ngForm">
      <div class="form-group">
        <label for="tensach">Tên sách <span class="required">*</span></label>
        <input 
          type="text" 
          id="tensach" 
          name="tensach"
          [(ngModel)]="book.tensach"
          required
          class="form-control"
        />
      </div>

      <div class="form-group">
        <label for="giaban">Giá bán</label>
        <input 
          type="number" 
          id="giaban" 
          name="giaban"
          [(ngModel)]="book.giaban"
          step="0.01"
          min="0"
          class="form-control"
        />
      </div>

      <div class="form-group">
        <label for="mota">Mô tả</label>
        <textarea 
          id="mota" 
          name="mota"
          [(ngModel)]="book.mota"
          rows="5"
          class="form-control"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="anhbia">Ảnh bìa</label>
        <input 
          type="file" 
          id="anhbia" 
          name="anhbiaFile"
          (change)="onImageSelected($event)"
          accept="image/*"
          class="form-control-file"
        />
        <input 
          type="text" 
          name="anhbia"
          [(ngModel)]="book.anhbia"
          placeholder="Hoặc nhập tên file ảnh"
          class="form-control mt-2"
        />
        @if (imagePreview) {
          <div class="image-preview">
            <img [src]="imagePreview" alt="Preview" />
          </div>
        }
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="soluongton">Số lượng tồn</label>
          <input 
            type="number" 
            id="soluongton" 
            name="soluongton"
            [(ngModel)]="book.soluongton"
            min="0"
            class="form-control"
          />
        </div>

        <div class="form-group half">
          <label for="macd">Mã CD</label>
          <input 
            type="number" 
            id="macd" 
            name="macd"
            [(ngModel)]="book.macd"
            min="0"
            class="form-control"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="manxb">Mã NXB</label>
        <input 
          type="number" 
          id="manxb" 
          name="manxb"
          [(ngModel)]="book.manxb"
          min="0"
          class="form-control"
        />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="saving">
          {{ saving ? 'Đang lưu...' : (isEditMode ? 'Cập nhật' : 'Tạo mới') }}
        </button>
        <a routerLink="/ex50/books" class="btn btn-secondary">Hủy</a>
      </div>
    </form>
  }

  <div class="back-link">
    <a routerLink="/ex50/books">← Quay lại danh sách</a>
  </div>
</div>
